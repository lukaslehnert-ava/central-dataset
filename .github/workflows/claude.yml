name: Process PBIP with pbi-tools

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pbi-tools
      run: |
        # Download and install pbi-tools CLI directly
        wget -O pbi-tools.zip https://github.com/pbi-tools/pbi-tools/releases/download/1.0.0-rc.4/pbi-tools.1.0.0-rc.4.zip
        unzip pbi-tools.zip -d pbi-tools
        chmod +x pbi-tools/pbi-tools
        echo "${{ github.workspace }}/pbi-tools" >> $GITHUB_PATH

    - name: Validate PBIP files
      run: |
        # Find all PBIP files and validate them
        find . -name "*.pbip" -type f | while read pbip_file; do
          echo "Validating: $pbip_file"
          pbi-tools info "$pbip_file"
        done

    - name: Build PBIX from PBIP
      run: |
        # Find PBIP files and compile them to PBIX
        find . -name "*.pbip" -type f | while read pbip_file; do
          pbix_output="${pbip_file%.pbip}.pbix"
          echo "Building PBIX: $pbix_output from $pbip_file"
          pbi-tools compile "$pbip_file" -format PBIX -outPath "$pbix_output"
        done

    - name: Upload built PBIX files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pbix-files-${{ github.run_number }}
        path: |
          **/*.pbix
        retention-days: 30
