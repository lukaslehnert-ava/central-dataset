# .github/workflows/pbi-tools-build.yml
name: Build Central Dataset PBIP

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.pbip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download pbi-tools Core CLI
        run: |
          mkdir -p tools
          curl -fsSL \
            -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      - name: Show repo tree
        run: ls -R .

      - name: Compile sales-semo.pbip → PBIT
        run: |
          mkdir -p artifacts
          pbi-tools.core compile \
            central-dataset/Sales-Cockpit/sales-semo.pbip \
            artifacts \
            sales-semo.pbit \
            PBIT \
            overwrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sales-semo-pbit
          path: artifacts/sales-semo.pbit
