# .github/workflows/pbi-tools-build.yml
name: Build Central Dataset PBIP

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.pbip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download pbi-tools Core CLI
        run: |
          mkdir -p tools
          curl -fsSL \
            -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      - name: Show repo tree (for debugging)
        run: ls -R .

      - name: Compile all PBIP projects
        run: |
          mkdir -p artifacts
          shopt -s globstar nullglob
          for pbip in $(find . -type f -name '*.pbip'); do
            name=$(basename "$pbip" .pbip)
            echo "📊 Compiling $pbip → artifacts/${name}.pbix"
            pbi-tools.core compile "$pbip" artifacts "${name}.pbix" overwrite
          done

      - name: Upload PBIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-pbix
          path: artifacts/*.pbix
