name: BIM Test
on:
  workflow_dispatch:

jobs:
  verify:
    name: VERIFY
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Download and install pbi-tools core CLI
      - name: Download pbi-tools core CLI
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # 3. Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      $1

      # 5. Generate BIM file for testing
      - name: Generate BIM file
        run: |
          set -euo pipefail
          # Generate a BIM file from the model folder
          tools/pbi-tools.core generate-bim \
            --model-dir "Sales-Cockpit" \
            --out "Sales-Cockpit/model.bim"
