# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker (ENTRYPOINT)

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ghcr.io/pbi-tools/pbi-tools-core:1.2.0

      - name: Version check (use image ENTRYPOINT)
        run: docker run --rm ghcr.io/pbi-tools/pbi-tools-core:1.2.0 --version

      - name: Compile PBIP → PBIX
        run: |
          mkdir -p artifacts
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:1.2.0 \
            compile reports/SalesReport artifacts SalesReport.pbix overwrite
