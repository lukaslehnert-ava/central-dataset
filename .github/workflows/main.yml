# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest

    # This tells Actions to run *everything* inside the specified container.
    # It still “runs the docker image,” but you don’t have to do `docker run` yourself.
    container:
      image: ghcr.io/pbi-tools/pbi-tools-core:1.2.0
      # If your org blocks anonymous pulls from GHCR, uncomment:
      # permissions:
      #   packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify pbi-tools is on PATH
        run: |
          pbi-tools --version
          pbi-tools --help

      # ↳ Now you can call any pbi-tools command exactly as if you’d installed it:
      - name: Extract a PBIX into folder
        run: |
          mkdir -p src
          pbi-tools extract "./reports/MyReport.pbix" ./src/MyReport

      - name: Compile PBIP → PBIX artifact
        run: |
          mkdir -p artifacts
          pbi-tools compile ./src/MyReport ./artifacts MyReport.pbit overwrite

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbi-tools-artifacts
          path: |
            src/**
            artifacts/**
