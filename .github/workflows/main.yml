# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ghcr.io/pbi-tools/pbi-tools-core:1.2.0

      - name: Version check
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:1.2.0 \
            bash -lc 'pbi-tools.core --version'

      # Example: compile all PBIP projects to PBIX/PBIT
      - name: Compile PBIP projects
        run: |
          mkdir -p artifacts
          bash -lc '
            shopt -s globstar nullglob
            for f in **/*.pbip; do
              proj_dir="$(dirname "$f")"
              name="$(basename "$proj_dir")"
              echo "Compiling $proj_dir → artifacts/${name}.pbix"
              docker run --rm -v "${GITHUB_WORKSPACE}:/work" -w /work \
                ghcr.io/pbi-tools/pbi-tools-core:1.2.0 \
                bash -lc "pbi-tools.core compile \"$proj_dir\" artifacts \"${name}.pbix\" overwrite"
            done
          '
