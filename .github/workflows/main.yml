# .github/workflows/pbi-tools-check.yml
name: pbi-tools check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pbi-tools/pbi-tools-core:latest
      options: --user root
      env:
        PATH: /root/.dotnet/tools:${PATH}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify pbi-tools
        run: pbi-tools --version
