# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Pull the pbi-tools container
        run: docker pull ghcr.io/pbi-tools/pbi-tools-core:latest

      - name: Smoke-test the CLI
        run: |
          docker run --rm \
            --entrypoint pbi-tools.core \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:latest \
            --version

      - name: Compile PBIP → PBIX
        run: |
          mkdir -p artifacts
          docker run --rm \
            --entrypoint pbi-tools.core \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:latest \
            compile reports/MyReport artifacts MyReport.pbix overwrite

      - name: Upload PBIX
        uses: actions/upload-artifact@v4
        with:
          name: pbix
          path: artifacts/*.pbix
