# .github/workflows/pbi-tools-install.yml
name: pbi-tools install & verify

on: workflow_dispatch

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download pbi-tools Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip

      - name: Unzip CLI into tools/
        run: unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools

      - name: Inspect tools folder
        run: ls -l tools

      - name: Find & run the correct binary
        run: |
          BIN=$(ls tools | grep '^pbi-tools' | head -n1)
          echo "Using binary: $BIN"
          chmod +x tools/$BIN
          tools/$BIN --version
