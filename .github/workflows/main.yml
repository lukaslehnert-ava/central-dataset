name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest

    # ← This spins up the container for ALL steps in this job
    container:
      image: ghcr.io/pbi-tools/pbi-tools-core:1.2.0
      # If you get permission errors pulling from GHCR, uncomment:
      # permissions:
      #   packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify pbi-tools
        run: |
          echo "Which pbi-tools? $(which pbi-tools || echo not found)"
          pbi-tools --version
          pbi-tools --help
