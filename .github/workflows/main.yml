# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest

    # run ALL steps inside this container, as root (so /root/.dotnet/tools is on your PATH)
    container:
      image: ghcr.io/pbi-tools/pbi-tools-core:1.2.0
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify pbi-tools is on PATH
        run: |
          echo "User: $(id -u -n)"
          echo "PATH: $PATH"
          which pbi-tools     # should print something like /root/.dotnet/tools/pbi-tools
          pbi-tools --version
          pbi-tools --help
