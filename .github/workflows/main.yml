# .github/workflows/pbi-tools.yml
name: pbi-tools baseline

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    # If your org restricts GHCR pulls, uncomment the next two lines.
    # permissions:
    #   packages: read
    container: ghcr.io/pbi-tools/pbi-tools-core:1.2.0
    steps:
      - uses: actions/checkout@v4

      # Smoke test (works in this container because PATH is set)
      - name: pbi-tools version
        run: pbi-tools --version

      # Example real step: compile all PBIP projects to PBIX artifacts
      - name: Compile PBIP to PBIX
        run: |
          mkdir -p artifacts
          shopt -s globstar nullglob
          for f in **/*.pbip; do
            proj_dir="$(dirname "$f")"
            name="$(basename "$proj_dir")"
            echo "Compiling $proj_dir → artifacts/${name}.pbix"
            pbi-tools compile "$proj_dir" artifacts "${name}.pbix" overwrite
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbix
          path: artifacts/*.pbix
