name: pbi-tools via Docker (inspect + run)

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull pbi-tools-core image
        run: docker pull ghcr.io/pbi-tools/pbi-tools-core:latest

      - name: Inspect image metadata
        run: |
          docker inspect ghcr.io/pbi-tools/pbi-tools-core:latest \
            --format='ENTRYPOINT={{json .Config.Entrypoint}} CMD={{json .Config.Cmd}}'
      
      - name: Version check
        run: |
          # Replace <ENTRY> with the Entrypoint value you saw above,
          # e.g. "/app/run.sh" or "pbi-tools.core".
          ENTRY=<ENTRY>
          docker run --rm \
            --entrypoint "$ENTRY" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:latest \
            --version

      - name: Compile PBIP → PBIX
        run: |
          mkdir -p artifacts
          ENTRY=<ENTRY>
          docker run --rm \
            --entrypoint "$ENTRY" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/pbi-tools/pbi-tools-core:latest \
            compile reports/SalesReport artifacts SalesReport.pbix overwrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbix
          path: artifacts/*.pbix

