# .github/workflows/pbi-tools.yml
name: pbi-tools check

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Install pbi-tools.core
        run: dotnet tool install --global pbi-tools.core --version 1.2.0

      - name: Verify and run a command
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          pbi-tools.core --version
          # Example: compile your PBIP
          # pbi-tools.core compile ./reports/MyReport ./artifacts MyReport.pbix overwrite
