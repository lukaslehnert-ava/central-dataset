# .github/workflows/pbi-tools-docker.yml
name: pbi-tools via Docker

on:
  workflow_dispatch:

jobs:
  pbi-tools:
    runs-on: ubuntu-latest

    # ← This tells Actions to run *all* steps in the pbi-tools image
    container:
      image: ghcr.io/pbi-tools/pbi-tools-core:1.2.0
      # If you hit permission errors pulling from GHCR, add:
      # permissions:
      #   packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify pbi-tools is available
        run: |
          pbi-tools --version
          pbi-tools --help
