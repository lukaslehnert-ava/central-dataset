name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Download and install pbi-tools core CLI
      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # 3. Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # 4. Unzip the .pbip archive into a folder
      - name: Unzip PBIP project
        run: |
          set -euo pipefail
          PBIP_FILE="Sales-Cockpit/sales-semo.pbip"
          if [ ! -f "$PBIP_FILE" ]; then
            echo "Error: PBIP file not found at $PBIP_FILE"
            exit 1
          fi
          EXTRACT_DIR="Sales-Cockpit/extracted"
          mkdir -p "$EXTRACT_DIR"
          echo "Extracting $PBIP_FILE to $EXTRACT_DIR"
          unzip -q "$PBIP_FILE" -d "$EXTRACT_DIR"

      # 5. Compile the extracted project into a PBIX
      - name: Compile extracted project
        run: |
          set -euo pipefail
          PROJECT_FOLDER="Sales-Cockpit/extracted"
          OUT_DIR="Sales-Cockpit/output"
          mkdir -p "$OUT_DIR"
          OUT_FILE="$OUT_DIR/sales-semo.pbix"
          echo "Compiling from $PROJECT_FOLDER to $OUT_FILE"
          tools/pbi-tools.core compile \
            "$PROJECT_FOLDER" \
            "$OUT_FILE"

      # 6. Verify installation \
            "$PROJECT_FILE" \
            "$OUT_FILE"

      # 5. Verify installation
      - name: Verify pbi-tools installation
        run: |
          set -euo pipefail
          tools/pbi-tools.core info
