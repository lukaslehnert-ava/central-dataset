name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Download and install pbi-tools core CLI
      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # 3. Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # 4. Compile the PBIP file into PBIX
      - name: Compile Sales-Cockpit project
        run: |
          set -euo pipefail
          # Define the path to your PBIP file
          PROJECT_FILE="central-dataset/Sales-Cockpit/sales-semo.pbip"
          # Ensure the PBIP file exists
          if [ ! -f "$PROJECT_FILE" ]; then
            echo "Error: PBIP file not found at $PROJECT_FILE"
            exit 1
          fi
          # Define output PBIX path
          OUT_DIR="$(dirname "$PROJECT_FILE")/output"
          mkdir -p "$OUT_DIR"
          OUT_FILE="$OUT_DIR/$(basename "${PROJECT_FILE%.*}.pbix")"
          # Run the compile command
          tools/pbi-tools.core compile \
            "$PROJECT_FILE" \
            "$OUT_FILE"

      # 5. Verify pbi-tools installation. Verify pbi-tools installation
      - name: Verify pbi-tools installation
        run: |
          set -euo pipefail
          tools/pbi-tools.core info
