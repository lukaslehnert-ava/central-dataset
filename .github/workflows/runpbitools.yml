name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Download and install pbi-tools core CLI
      - name: Download pbi-tools core CLI
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # 3. Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # 4. Detect and compile .pbip project
      - name: Compile Sales-Cockpit project
        run: |
          set -euo pipefail
          PROJECT_PATH="Sales-Cockpit"
          INPUT="${PROJECT_PATH}/sales-semo.pbip"
          # Determine if input is a file or folder
          if [ -f "$INPUT" ]; then
            echo "Detected PBIP file: $INPUT"
            TEMP_DIR="${PROJECT_PATH}/.pbi_extract"
            mkdir -p "$TEMP_DIR"
            echo "Extracting PBIP to $TEMP_DIR..."
            unzip -q "$INPUT" -d "$TEMP_DIR"
            WORKDIR="$TEMP_DIR"
          elif [ -d "$INPUT" ]; then
            echo "Detected PBIP folder: $INPUT"
            WORKDIR="$INPUT"
          else
            echo "Error: PBIP not found at $INPUT"
            exit 1
          fi
          # Prepare output
          OUT_DIR="${PROJECT_PATH}/output"
          mkdir -p "$OUT_DIR"
          OUT_FILE="$OUT_DIR/$(basename "${INPUT%.*}.pbix")"
          echo "Compiling from $WORKDIR to $OUT_FILE..."
          tools/pbi-tools.core compile "$WORKDIR" "$OUT_FILE"

      # 5. Verify pbi-tools installation
      - name: Verify pbi-tools installation
        run: |
          set -euo pipefail
          tools/pbi-tools.core info
