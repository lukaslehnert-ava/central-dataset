name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Download and install pbi-tools core CLI directly
      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # 3. Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # 4. Unzip the .pbip project into a source folder
      - name: Unzip PBIP project
        run: |
          set -euo pipefail
          mkdir -p central-dataset/Sales-Cockpit/extracted
          unzip -q central-dataset/Sales-Cockpit/sales-semo.pbip \
            -d central-dataset/Sales-Cockpit/extracted

      # 5. Compile the extracted project into a PBIX
      - name: Compile extracted project
        run: |
          set -euo pipefail
          mkdir -p central-dataset/Sales-Cockpit/output
          tools/pbi-tools.core compile \
            central-dataset/Sales-Cockpit/extracted \
            central-dataset/Sales-Cockpit/output/sales-semo.pbix

      # 6. Verify pbi-tools installation
      - name: Verify pbi-tools installation
        run: |
          set -euo pipefail
          tools/pbi-tools.core info
