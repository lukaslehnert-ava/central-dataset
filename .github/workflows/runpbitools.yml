name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Download and install pbi-tools core CLI directly
      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      # Step 3: Add CLI to PATH
      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # Step 4: Compile the PBIP-based project using the correct folder path
      - name: Compile Sales-Cockpit Project
        working-directory: Sales-Cockpit
        run: |
          set -euo pipefail
          # Ensure output directory exists in Sales-Cockpit
          mkdir -p output
          # Compile the project in the current directory
          pbi-tools.core compile . ./output/sales-semo.pbix

      # Step 5: Verify pbi-tools installation
      - name: Verify pbi-tools installation
        run: |
          set -euo pipefail
          pbi-tools.core info
