# .github/workflows/pbi-tools-build.yml
name: Install & Build Central Dataset

on:
  workflow_dispatch:
  push:
    paths:
      - 'central-dataset/Sales-Cockpit/**'

jobs:
  install:
    name: Install pbi-tools Core CLI
    runs-on: ubuntu-latest
    outputs:
      tools-path: ${{ steps.add-path.outputs.tools-path }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      - name: Add CLI to PATH
        id: add-path
        run: echo "::set-output name=tools-path::${GITHUB_WORKSPACE}/tools"

      - name: Verify pbi-tools installation
        run: tools/pbi-tools.core info

  build:
    name: Compile PBIP → PBIX
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show full repo tree
        run: ls -R .

      - name: Compile sales-semo.pbip → PBIX
        env:
          PATH: ${{ needs.install.outputs.tools-path }}:$PATH
        run: |
          mkdir -p artifacts
          pbi-tools.core compile \
            central-dataset/Sales-Cockpit/sales-semo.pbip \
            artifacts \
            sales-semo.pbix \
            overwrite

      - name: Upload PBIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sales-semo-pbix
          path: artifacts/sales-semo.pbix
