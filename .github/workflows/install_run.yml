name: PBI Tools CI
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-pbi-tools:
    name: Run pbi-tools CLI in GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository so we can access project files
      - name: Checkout repository
        uses: actions/checkout@v3

            # Download and install pbi-tools core CLI directly
      - name: Download Core CLI ZIP
        run: |
          mkdir -p tools
          curl -fsSL -o tools/pbi-tools.core.1.2.0_linux-x64.zip \
            https://github.com/pbi-tools/pbi-tools/releases/download/1.2.0/pbi-tools.core.1.2.0_linux-x64.zip
          unzip -q tools/pbi-tools.core.1.2.0_linux-x64.zip -d tools
          chmod +x tools/pbi-tools.core

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/tools" >> $GITHUB_PATH

      # Compile the PBIP-based project
      - name: Compile Sales-Cockpit Project
        working-directory: central-dataset/Sales-Cockpit
        run: |
          # Create an output folder for the generated PBIX
          mkdir -p output
          # Compile the project ('.' refers to the folder containing sales-semo.pbip)
          tools/pbi-tools.core compile . ./output/sales-semo.pbix

      # Optional: Print diagnostic info about the environment
      - name: Verify pbi-tools installation
        run: tools/pbi-tools.core info
      
